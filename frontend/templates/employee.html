<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--blue:#378ADD;--blue-dark:#185FA5;
  --purple:#7C5CBF;--purple-dark:#5B3FA0;--red:#D85A30;--orange:#EF9F27;
  --bg:#0D0F14;--card:#161920;--card2:#1C1F28;--border:#252830;
  --text:#F0F2F5;--muted:#6B7280;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;z-index:0}

.topbar{position:relative;z-index:10;background:rgba(17,19,24,.92);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.logo{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:12px;font-weight:800;color:#fff}
.topbar h1{font-family:var(--font-head);font-size:15px;font-weight:700}
.badge-emp{padding:3px 10px;background:rgba(29,158,117,.2);color:var(--green);border-radius:20px;font-size:11px;font-weight:600}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.btn-logout{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--red);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:.2s}
.btn-logout:hover{background:rgba(216,90,48,.1)}

.content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px 16px;gap:18px}

.emp-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 22px;width:100%;max-width:500px;display:flex;align-items:center;gap:16px}
.emp-avatar{width:50px;height:50px;background:linear-gradient(135deg,var(--green),var(--blue));border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.emp-info h2{font-family:var(--font-head);font-size:16px;font-weight:700}
.emp-info p{font-size:12px;color:var(--muted);margin-top:3px}
.status-pill{margin-left:auto;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;flex-shrink:0}
.pill-present{background:rgba(29,158,117,.2);color:var(--green)}
.pill-absent{background:rgba(216,90,48,.15);color:var(--red)}

.section-title{font-family:var(--font-head);font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;width:100%;max-width:500px}

/* ── STEP 1: Work Type Cards (WFH/WFO/Field) ── */
.worktype-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:100%;max-width:500px}
.wt-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:20px 14px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;position:relative;overflow:hidden;user-select:none}
.wt-card:hover{transform:translateY(-3px)}
.wt-card.wfh{--acc:var(--green)}
.wt-card.wfo{--acc:var(--blue)}
.wt-card.field{--acc:var(--orange)}
.wt-card:hover,.wt-card.selected{border-color:var(--acc);box-shadow:0 0 20px rgba(0,0,0,.4)}
.wt-card.selected{background:rgba(255,255,255,.04)}
.wt-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;transition:.25s}
.wt-card.wfh .wt-icon{background:rgba(29,158,117,.15)}
.wt-card.wfo .wt-icon{background:rgba(55,138,221,.15)}
.wt-card.field .wt-icon{background:rgba(239,159,39,.15)}
.wt-card:hover.wfh .wt-icon,.wt-card.selected.wfh .wt-icon{background:rgba(29,158,117,.28)}
.wt-card:hover.wfo .wt-icon,.wt-card.selected.wfo .wt-icon{background:rgba(55,138,221,.28)}
.wt-card:hover.field .wt-icon,.wt-card.selected.field .wt-icon{background:rgba(239,159,39,.28)}
.wt-name{font-family:var(--font-head);font-size:13px;font-weight:700}
.wt-card.wfh .wt-name{color:var(--green)}
.wt-card.wfo .wt-name{color:var(--blue)}
.wt-card.field .wt-name{color:var(--orange)}
.wt-desc{font-size:11px;color:var(--muted);line-height:1.4}
.wt-check{position:absolute;top:8px;right:10px;font-size:16px;opacity:0;transition:.2s}
.wt-card.selected .wt-check{opacity:1}

/* ── STEP 2: Method Cards ── */
.method-section{width:100%;max-width:500px;animation:fadeIn .3s ease forwards}
.method-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%}
/* WFH: only Face */
.method-grid.wfh-methods{grid-template-columns:1fr}
/* Field: only 1 card */
.method-grid.field-methods{grid-template-columns:1fr}

.method-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:18px 12px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;text-decoration:none;position:relative;overflow:hidden}
.method-card:hover{transform:translateY(-3px)}
.method-card.face{--accent:var(--green)}
.method-card.wifi{--accent:var(--blue)}
.method-card.otp{--accent:var(--purple)}
.method-card.fieldgo{--accent:var(--orange)}
.method-card:hover{border-color:var(--accent)}
.method-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.method-card.face .method-icon{background:rgba(29,158,117,.15)}
.method-card.wifi .method-icon{background:rgba(55,138,221,.15)}
.method-card.otp  .method-icon{background:rgba(124,92,191,.15)}
.method-card.fieldgo .method-icon{background:rgba(239,159,39,.15)}
.method-card:hover.face .method-icon{background:rgba(29,158,117,.28)}
.method-card:hover.wifi .method-icon{background:rgba(55,138,221,.28)}
.method-card:hover.otp  .method-icon{background:rgba(124,92,191,.28)}
.method-card:hover.fieldgo .method-icon{background:rgba(239,159,39,.28)}
.method-name{font-family:var(--font-head);font-size:13px;font-weight:700}
.method-card.face .method-name{color:var(--green)}
.method-card.wifi .method-name{color:var(--blue)}
.method-card.otp  .method-name{color:var(--purple)}
.method-card.fieldgo .method-name{color:var(--orange)}
.method-desc{font-size:11px;color:var(--muted);line-height:1.4}

.marked-banner{background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.3);border-radius:14px;padding:14px 18px;width:100%;max-width:500px;display:flex;align-items:center;gap:12px}
.marked-banner .icon{font-size:24px}
.marked-banner .text h3{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--green)}
.marked-banner .text p{font-size:12px;color:var(--muted);margin-top:2px}

.today-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;width:100%;max-width:500px}
.today-card h3{font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border:none}
.info-row .lbl{font-size:12px;color:var(--muted)}
.info-row .val{font-size:12px;font-weight:500}

.fade-in{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:500px){
  .topbar{padding:0 12px}
  .content{padding:14px 12px;gap:14px}
  .emp-card,.today-card{padding:14px 16px}
  .worktype-grid,.method-grid{gap:9px}
  .wt-card{padding:16px 10px}
  .wt-name{font-size:12px}
  .wt-desc{display:none}
  .method-card{padding:14px 10px}
}
@media(max-width:360px){
  .worktype-grid{grid-template-columns:1fr}
  .wt-card{flex-direction:row;text-align:left;padding:14px}
  .wt-icon{flex-shrink:0}
  .wt-desc{display:block}
  .method-grid{grid-template-columns:1fr}
  .method-card{flex-direction:row;text-align:left;padding:14px}
  .method-icon{flex-shrink:0}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">SA</div>
  <h1>My Attendance</h1>
  <span class="badge-emp">Employee</span>
  <div class="topbar-right">
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="content fade-in">

  <!-- Employee Info -->
  <div class="emp-card">
    <div class="emp-avatar" id="emp-avatar">?</div>
    <div class="emp-info">
      <h2 id="emp-name">Loading...</h2>
      <p id="emp-id-text">Emp ID: —</p>
    </div>
    <span class="status-pill pill-absent" id="today-pill">Loading...</span>
  </div>

  <!-- Already Marked Banner (hidden by default) -->
  <div class="marked-banner" id="marked-banner" style="display:none">
    <div class="icon">✅</div>
    <div class="text">
      <h3>Today Attendance Marked</h3>
      <p id="marked-detail">—</p>
    </div>
  </div>

  <!-- STEP 1: Choose Work Type -->
  <div class="section-title" id="step1-label">Step 1 — Select Work Type </div>

  <div class="worktype-grid" id="worktype-grid">
    <!-- WFH -->
    <div class="wt-card wfh" onclick="selectWorkType('WFH',this)">
      <span class="wt-check">✓</span>
      <div class="wt-icon">🏠</div>
      <div class="wt-name">WFH</div>
      <div class="wt-desc">Work From Home</div>
    </div>
    <!-- WFO -->
    <div class="wt-card wfo" onclick="selectWorkType('WFO',this)">
      <span class="wt-check">✓</span>
      <div class="wt-icon">🏢</div>
      <div class="wt-name">WFO</div>
      <div class="wt-desc">Work From Office</div>
    </div>
    <!-- Field -->
    <div class="wt-card field" onclick="selectWorkType('Field',this)">
      <span class="wt-check">✓</span>
      <div class="wt-icon">🛠️</div>
      <div class="wt-name">Field</div>
      <div class="wt-desc">Field Work</div>
    </div>
  </div>

  <!-- STEP 2: Choose Method (hidden initially) -->
  <div class="method-section" id="method-section" style="display:none">
    <div class="section-title" style="margin-bottom:12px" id="step2-label">Step 2 — Attendance Method</div>
    <div class="method-grid" id="method-grid">
      <!-- dynamically filled -->
    </div>
  </div>

  <!-- Today Info -->
  <div class="today-card">
    <h3>Today Info</h3>
    <div class="info-row"><span class="lbl">Date</span><span class="val" id="info-date">—</span></div>
    <div class="info-row"><span class="lbl">Status</span><span class="val" id="info-status">—</span></div>
    <div class="info-row"><span class="lbl">Time</span><span class="val" id="info-time">—</span></div>
    <div class="info-row"><span class="lbl">Method</span><span class="val" id="info-method">—</span></div>
  </div>

</div>

<script>
const user = JSON.parse(sessionStorage.getItem('user') || '{}');
let selectedWorkType = null;
let attendanceDone = false;

const name   = user.name   || '—';
const emp_id = user.emp_id || '—';
document.getElementById('emp-name').textContent    = `Welcome, ${name}`;
document.getElementById('emp-id-text').textContent = `Emp ID: ${emp_id}`;
document.getElementById('emp-avatar').textContent  = name.charAt(0).toUpperCase();
document.getElementById('info-date').textContent   = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});

function selectWorkType(type, el) {
  if (attendanceDone) return;
  selectedWorkType = type;
  // Highlight selected card
  document.querySelectorAll('.wt-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  // Show method step
  showMethods(type);
}

function showMethods(type) {
  const section = document.getElementById('method-section');
  const grid    = document.getElementById('method-grid');
  const label   = document.getElementById('step2-label');

  section.style.display = 'block';

  if (type === 'WFH') {
    label.textContent = 'Step 2 — WFH Attendance Method';
    grid.className = 'method-grid wfh-methods';
    grid.innerHTML = `
      <a class="method-card face" href="/employee/face?type=WFH">
        <div class="method-icon">🤳</div>
        <div class="method-name">Face Attendance</div>
        <div class="method-desc">Scan face on Camera   —Gps is not check for WFH</div>
      </a>`;
  } else if (type === 'WFO') {
    label.textContent = 'Step 2 — WFO Attendance Method';
    grid.className = 'method-grid';
    grid.innerHTML = `
      <a class="method-card face" href="/employee/face?type=WFO">
        <div class="method-icon">🤳</div>
        <div class="method-name">By Face</div>
        <div class="method-desc">Scan Face on Camera</div>
      </a>
      <a class="method-card wifi" href="/employee/wifi">
        <div class="method-icon">📶</div>
        <div class="method-name">By WiFi</div>
        <div class="method-desc">Office WiFi auto mark</div>
      </a>
      <a class="method-card otp" href="/employee/otp">
        <div class="method-icon">🔢</div>
        <div class="method-name">By OTP</div>
        <div class="method-desc">Mobile OTP verify</div>
      </a>`;
  } else if (type === 'Field') {
    label.textContent = 'Step 2 — Field Attendance';
    grid.className = 'method-grid field-methods';
    grid.innerHTML = `
      <a class="method-card fieldgo" href="/employee/field-engineer">
        <div class="method-icon">🛠️</div>
        <div class="method-name">Field Attendance</div>
        <div class="method-desc">GPS • Place • Time — Attendance Mark for Field location </div>
      </a>`;
  }

  // Store work type in sessionStorage for face page to use
  sessionStorage.setItem('workType', type);
}

async function checkStatus() {
  const d = await fetch('/api/my-status', { credentials: 'include' }).then(r => r.json()).catch(() => null);
  if (!d || !d.ok) return;

  const pill   = document.getElementById('today-pill');
  const banner = document.getElementById('marked-banner');

  if (d.marked && d.record) {
    if (d.record.out_time) {
      attendanceDone = true;
      pill.textContent = '✓ Present';
      pill.className   = 'status-pill pill-present';
    } else {
      pill.textContent = '✓ IN Marked';
      pill.className   = 'status-pill pill-present';
    }

    banner.style.display = 'flex';
    document.getElementById('marked-detail').textContent =
      `IN: ${d.record.in_time||'—'} • OUT: ${d.record.out_time||'—'} • Method: ${d.record.method_out||d.record.method||'—'}`;

    document.getElementById('info-status').textContent = d.record.out_time ? 'Present ✓' : 'IN Marked';
    document.getElementById('info-time').textContent   = d.record.out_time ? `${d.record.in_time||'—'} → ${d.record.out_time}` : (d.record.in_time||'—');
    document.getElementById('info-method').textContent = d.record.method||'—';

    if (d.record.out_time) {
      document.getElementById('step1-label').textContent = '✅ Today Attendance Complete';
      document.querySelectorAll('.wt-card').forEach(c => { c.style.opacity='.4'; c.style.pointerEvents='none'; });
      document.getElementById('method-section').style.display = 'none';
    } else {
      document.getElementById('step1-label').textContent = '⏳ OUT Pending — Method Select';
    }
  } else {
    pill.textContent = 'Not Marked';
    pill.className   = 'status-pill pill-absent';
    document.getElementById('info-status').textContent = 'Not marked yet';
    document.getElementById('info-time').textContent   = '—';
    document.getElementById('info-method').textContent = '—';
  }
}

async function doLogout() {
  await fetch('/api/logout', {method:'POST'});
  sessionStorage.clear();
  window.location.href = '/';
}

checkStatus();
</script>
</body>
</html>
