<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#1D9E75;--green-dark:#0F6E56;--blue:#378ADD;--red:#D85A30;--orange:#EF9F27;--bg:#0D0F14;--card:#161920;--card2:#1C1F28;--border:#252830;--text:#F0F2F5;--muted:#6B7280;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;z-index:0}

.topbar{position:relative;z-index:10;background:rgba(17,19,24,.92);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(12px)}
.back-btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:.2s;text-decoration:none;display:flex;align-items:center;gap:5px}
.back-btn:hover{color:var(--text);border-color:var(--text)}
.logo{width:34px;height:34px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px}
.topbar h1{font-family:var(--font-head);font-size:15px;font-weight:700}
.type-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-left:4px}
.badge-wfh{background:rgba(29,158,117,.2);color:var(--green)}
.badge-wfo{background:rgba(55,138,221,.2);color:var(--blue)}
.topbar-right{margin-left:auto}
.btn-logout{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--red);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:.2s}
.btn-logout:hover{background:rgba(216,90,48,.1)}

.content{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:16px}

.emp-info{background:var(--card2);border-radius:12px;padding:16px}
.emp-info h2{font-family:var(--font-head);font-size:17px;font-weight:700;margin-bottom:4px}
.emp-info p{font-size:12px;color:var(--muted)}

.net-bar{padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500}
.net-bar.ok {background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);color:var(--green)}
.net-bar.bad{background:rgba(216,90,48,.1);border:1px solid rgba(216,90,48,.25);color:var(--red)}
.net-bar.chk{background:rgba(55,138,221,.1);border:1px solid rgba(55,138,221,.25);color:#378ADD}
.net-bar.wfh-ok{background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);color:var(--green)}

.cam-wrap{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:4/3}
.cam-wrap video{width:100%;height:100%;object-fit:cover}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);flex-direction:column;gap:8px;color:var(--muted);font-size:13px}
.cam-overlay .icon{font-size:36px}

.btn{padding:14px;border:none;border-radius:11px;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;width:100%;letter-spacing:.3px}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover:not(:disabled){background:var(--green-dark);transform:translateY(-1px)}
.btn-gray{background:var(--card2);color:var(--text)}
.btn:disabled{opacity:.5;cursor:not-allowed}

.status-card{background:var(--card2);border-radius:12px;padding:14px 16px}
.status-card h3{font-size:13px;font-weight:600;margin-bottom:10px;font-family:var(--font-head)}
.status-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.status-row:last-child{border-bottom:none}
.status-row .label{font-size:12px;color:var(--muted)}
.status-row .val{font-size:12px;font-weight:500}
.badge-present{background:rgba(29,158,117,.2);color:var(--green);padding:2px 8px;border-radius:20px;font-size:11px}

.msg-box{padding:10px 14px;border-radius:9px;font-size:13px;display:none}
.msg-box.show{display:block}
.msg-box.ok {background:rgba(29,158,117,.1);border:1px solid rgba(29,158,117,.25);color:var(--green)}
.msg-box.err{background:rgba(216,90,48,.1);border:1px solid rgba(216,90,48,.25);color:var(--red)}

.hint{font-size:11px;color:var(--muted);text-align:center}
.fade-in{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .content{padding:14px 10px}
  .card{padding:16px 14px;border-radius:16px}
  .topbar{padding:0 14px}
  .topbar h1{font-size:13px}
}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="/employee">← Back</a>
  <div class="logo">🤳</div>
  <h1>Face Attendance</h1>
  <span class="type-badge" id="type-badge"></span>
  <div class="topbar-right">
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</div>

<div class="content fade-in">
  <div class="card">
    <div class="emp-info">
      <h2 id="emp-name">Loading...</h2>
      <p id="emp-id">Emp ID: —</p>
    </div>

    <div class="net-bar chk" id="net-bar">📍 Checking...</div>

    <div class="cam-wrap">
      <video id="cam-video" autoplay playsinline></video>
      <div class="cam-overlay" id="cam-overlay">
        <div class="icon">🤳</div>
        <div>Press Button for mark attendance</div>
      </div>
    </div>

    <button class="btn btn-green" id="mark-btn" onclick="markAttendance()">Mark Face Attendance</button>
    <p class="hint" id="hint-text"></p>

    <div class="msg-box" id="msg"></div>

    <div class="status-card">
      <h3>Today Status</h3>
      <div class="status-row"><span class="label">Status</span><span class="val" id="st-status">—</span></div>
      <div class="status-row"><span class="label">Time</span><span class="val" id="st-time">—</span></div>
      <div class="status-row"><span class="label">Date</span><span class="val" id="st-date">—</span></div>
      <div class="status-row"><span class="label">Type</span><span class="val" id="st-type">—</span></div>
    </div>
  </div>
</div>

<script>
const user = JSON.parse(sessionStorage.getItem('user') || '{}');

// Get attendance type from URL param or sessionStorage
const urlParams = new URLSearchParams(window.location.search);
const attendanceType = urlParams.get('type') || sessionStorage.getItem('workType') || 'WFO';

let stream  = null;
let marked  = false;
let userLat = null;
let userLng = null;
const isWFH = (attendanceType === 'WFH');

document.getElementById('emp-name').textContent = `Welcome, ${user.name || '—'}`;
document.getElementById('emp-id').textContent   = `Emp ID: ${user.emp_id || '—'}`;
document.getElementById('st-date').textContent  = new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
document.getElementById('st-type').textContent  = attendanceType;

// Badge
const badge = document.getElementById('type-badge');
badge.textContent = attendanceType;
badge.className = attendanceType === 'WFH' ? 'type-badge badge-wfh' : 'type-badge badge-wfo';

// Hint
document.getElementById('hint-text').textContent = isWFH
  ? '🏠 WFH mode — GPS not check, only face scan'
  : '🏢 WFO mode — Camera + GPS verify ';

if (isWFH) {
  // WFH: no GPS needed
  const bar = document.getElementById('net-bar');
  bar.textContent = '✓ WFH Mode — GPS check bypass, face scan ';
  bar.className   = 'net-bar wfh-ok';
  userLat = 0; userLng = 0; // dummy values for WFH
} else {
  checkLocation();
  setInterval(checkLocation, 15000);
}

checkStatus();

async function checkLocation() {
  const bar = document.getElementById('net-bar');
  bar.textContent = '📍 Location checking...';
  bar.className   = 'net-bar chk';

  if (!navigator.geolocation) {
    bar.textContent = '✗ GPS browser not support ';
    bar.className   = 'net-bar bad';
    return;
  }

  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;

      const r = await fetch('/api/location-status', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({lat:userLat, lng:userLng})
      }).then(r=>r.json()).catch(()=>null);

      if (!r) { bar.textContent='✗ Server connect nahi'; bar.className='net-bar bad'; return; }

      if (r.in_office) {
        bar.textContent = `✓ Office mein — ${r.distance}m (limit: ${r.radius}m)`;
        bar.className   = 'net-bar ok';
      } else {
        bar.textContent = `✗ Office se ${r.distance}m door — ${r.radius}m limit`;
        bar.className   = 'net-bar bad';
      }
    },
    () => { bar.textContent='✗ GPS permission '; bar.className='net-bar bad'; },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

async function checkStatus() {
  const d = await fetch('/api/my-status').then(r=>r.json()).catch(()=>null);
  if (!d) return;
  if (d.marked && d.record) {
    marked = !!d.record.out_time;
    document.getElementById('st-status').innerHTML = d.record.out_time
      ? '<span class="badge-present">Present ✓</span>'
      : '<span class="badge-present">IN marked ✓</span>';
    document.getElementById('st-time').textContent = d.record.out_time
      ? `${d.record.in_time||'—'} → ${d.record.out_time||'—'}`
      : (d.record.in_time||'—');
    const btn = document.getElementById('mark-btn');
    btn.textContent = d.record.out_time ? 'Attendance Complete ✓' : 'Mark OUT (Face)';
    btn.disabled    = !!d.record.out_time;
    btn.className   = btn.disabled ? 'btn btn-gray' : 'btn btn-green';
  } else {
    document.getElementById('st-status').textContent = 'Not marked yet';
  }
}

async function markAttendance() {
  if (marked) return;

  if (!isWFH && (!userLat || !userLng)) {
    showMsg('GPS location not find — please refresh page', 'err');
    checkLocation();
    return;
  }

  if (!isWFH) {
    const loc = await fetch('/api/location-status', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({lat:userLat, lng:userLng})
    }).then(r=>r.json()).catch(()=>null);
    if (!loc || !loc.in_office) {
      showMsg(`Out of Office boundary  (${loc?loc.distance+'m':'?'}) — attendance not mark`, 'err');
      return;
    }
  }

  if (!stream) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
      document.getElementById('cam-video').srcObject = stream;
      document.getElementById('cam-overlay').style.display = 'none';
      showMsg('Camera open — scaning...', 'ok');
      setTimeout(doCapture, 1500);
    } catch(e) {
      showMsg('Camera permission allow: ' + e.message, 'err');
    }
    return;
  }
  doCapture();
}

async function doCapture() {
  if (!stream) return;

  const captureAndSend = async (lat, lng) => {
    const vid    = document.getElementById('cam-video');
    const canvas = document.createElement('canvas');
    canvas.width  = vid.videoWidth;
    canvas.height = vid.videoHeight;
    canvas.getContext('2d').drawImage(vid, 0, 0);
    const image = canvas.toDataURL('image/jpeg', 0.85);

    const btn = document.getElementById('mark-btn');
    btn.textContent = 'Processing...';
    btn.disabled    = true;

    const res = await fetch('/api/mark-attendance', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({image, lat, lng, tolerance:0.5, attendance_type: attendanceType})
    }).then(r=>r.json()).catch(()=>null);

    if (!res) { showMsg('Server error', 'err'); btn.disabled=false; btn.textContent='Mark Face Attendance'; return; }

    if (res.ok && res.marked.length > 0) {
      const mine = res.marked.find(m => m.emp_id === user.emp_id);
      if (mine) {
        showMsg(`✓ ${mine.status==='out_marked'?'OUT':'IN'} marked!`, 'ok');
        if (mine.status==='out_marked'||mine.status==='completed') {
          marked=true;
          btn.textContent='Attendance Complete ✓';
          btn.className='btn btn-gray';
          stream.getTracks().forEach(t=>t.stop());
          stream=null;
          document.getElementById('cam-overlay').style.display='flex';
        }
        setTimeout(()=>{ window.location.href='/employee'; }, 1500);
      } else {
        showMsg('Face not match —nearest on camera', 'err');
        btn.disabled=false; btn.textContent='Try Again';
      }
    } else {
      showMsg(res.error||'Face not detect  — Try Again', 'err');
      btn.disabled=false; btn.textContent='Try Again';
    }
  };

  if (isWFH) {
    // WFH: no GPS needed, pass null
    await captureAndSend(null, null);
  } else {
    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        userLat = pos.coords.latitude;
        userLng = pos.coords.longitude;
        await captureAndSend(userLat, userLng);
      },
      () => {
        showMsg('GPS capture not find on time', 'err');
        document.getElementById('mark-btn').disabled=false;
        document.getElementById('mark-btn').textContent='Try Again';
      },
      { enableHighAccuracy:true, timeout:8000 }
    );
  }
}

function showMsg(msg, type) {
  const el = document.getElementById('msg');
  el.textContent = msg;
  el.className   = `msg-box ${type} show`;
}

async function doLogout() {
  await fetch('/api/logout',{method:'POST'});
  sessionStorage.clear();
  window.location.href='/';
}
</script>
</body>
</html>
