<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Attendance — Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--blue:#378ADD;--purple:#7C3AED;
  --red:#D85A30;--bg:#0D0F14;--card:#161920;--border:#252830;
  --text:#F0F2F5;--muted:#6B7280;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.4;z-index:0}
body::after{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 60% 40%,rgba(29,158,117,.08) 0%,transparent 60%),radial-gradient(ellipse at 30% 70%,rgba(55,138,221,.06) 0%,transparent 50%);z-index:0}
.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px}
.logo-block{text-align:center;margin-bottom:24px}
.logo{width:56px;height:56px;background:var(--green);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:18px;font-weight:800;color:#fff;margin-bottom:14px;box-shadow:0 0 40px rgba(29,158,117,.3)}
.logo-block h1{font-family:var(--font-head);font-size:22px;font-weight:700;letter-spacing:-.5px}
.logo-block p{color:var(--muted);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px}
.role-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
.role-btn{padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.role-btn.active-admin{background:rgba(55,138,221,.12);border-color:var(--blue);color:var(--blue)}
.role-btn.active-emp{background:rgba(29,158,117,.12);border-color:var(--green);color:var(--green)}
.role-btn.active-super{background:rgba(124,58,237,.12);border-color:var(--purple);color:#A78BFA}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:12px;color:var(--muted);font-weight:500;margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.field-group input{width:100%;padding:12px 14px;background:#1C1F28;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:.2s}
.field-group input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.field-group input::placeholder{color:#3A3F4E}
.slug-hint{font-size:11px;color:var(--muted);margin-top:5px}
.slug-hint .ok{color:var(--green)}
.slug-hint .err{color:var(--red)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:10px;font-family:var(--font-head);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:8px;letter-spacing:.3px}
.btn-admin{background:var(--blue);color:#fff}
.btn-admin:hover{background:#185FA5;transform:translateY(-1px)}
.btn-emp{background:var(--green);color:#fff}
.btn-emp:hover{background:var(--green-dark);transform:translateY(-1px)}
.btn-super{background:var(--purple);color:#fff}
.btn-super:hover{background:#6D28D9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none!important}
.error-msg{background:rgba(216,90,48,.1);border:1px solid rgba(216,90,48,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.error-msg.show{display:block}
.link-row{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-top:6px}
.link{font-size:12px;color:var(--muted);text-decoration:none;cursor:pointer}
.link:hover{color:var(--text);text-decoration:underline}
.fade-in{animation:fadeIn .4s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none !important}
</style>
</head>
<body>
<div class="wrap fade-in">
  <div class="logo-block">
    <div class="logo">SA</div>
    <h1>Forgot Password</h1>
    <p>Same reset flow, different page</p>
  </div>

  <div class="card">
    <div class="role-tabs">
      <button class="role-btn active-admin" id="btn-admin" onclick="setRole('admin')">👑 Admin</button>
      <button class="role-btn" id="btn-emp" onclick="setRole('employee')">👤 Employee</button>
      <button class="role-btn" id="btn-super" onclick="setRole('super_admin')">🔑 Super</button>
    </div>

    <div class="field-group" id="slug-field">
      <label>Company Code</label>
      <input type="text" id="org-slug" placeholder="company-slug" oninput="checkSlug(this.value)">
      <div class="slug-hint" id="slug-hint">Enter our company code</div>
    </div>

    <div class="field-group" id="reset-name-wrap" style="display:none">
      <label>Name</label>
      <input type="text" id="reset-name" placeholder="Name" autocomplete="off">
    </div>

    <div class="field-group" id="reset-empid-wrap" style="display:none">
      <label>Employee ID</label>
      <input type="text" id="reset-empid" placeholder="emp_id" autocomplete="off">
    </div>

    <div class="field-group" id="reset-mobile-wrap" style="display:none">
      <label>Mobile</label>
      <input type="tel" id="reset-mobile" placeholder="10 digit mobile" maxlength="10" autocomplete="off">
    </div>

    <div class="field-group">
      <label>New Password</label>
      <input type="password" id="reset-password" placeholder="New password (6+ chars)">
    </div>

    <div class="link-row">
      <span class="link" onclick="window.location.href='/'">← Back</span>
      <span class="link" onclick="setRole('admin')" style="display:none">&nbsp;</span>
    </div>

    <button class="btn-primary" id="confirm-reset-btn" onclick="confirmResetDirect()">Update Password</button>

    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<script>
let currentRole = 'admin';
let slugTimeout = null;

function setRole(role) {
  currentRole = role;
  ['admin','emp','super'].forEach(r => {
    const el = document.getElementById('btn-' + r);
    if (el) el.className = 'role-btn';
  });

  const slugField = document.getElementById('slug-field');
  const nameWrap = document.getElementById('reset-name-wrap');
  const empidWrap = document.getElementById('reset-empid-wrap');
  const mobileWrap = document.getElementById('reset-mobile-wrap');

  const btn = document.getElementById('confirm-reset-btn');

  if (role === 'admin') {
    document.getElementById('btn-admin').className = 'role-btn active-admin';
    btn.className = 'btn-primary btn-admin';
    slugField.style.display = '';
    nameWrap.style.display = 'block';
    empidWrap.style.display = 'none';
    mobileWrap.style.display = 'block';
  } else if (role === 'employee') {
    document.getElementById('btn-emp').className = 'role-btn active-emp';
    btn.className = 'btn-primary btn-emp';
    slugField.style.display = '';
    nameWrap.style.display = 'block';
    empidWrap.style.display = 'block';
    mobileWrap.style.display = 'block';
  } else {
    document.getElementById('btn-super').className = 'role-btn active-super';
    btn.className = 'btn-primary btn-super';
    slugField.style.display = 'none';
    nameWrap.style.display = 'block';
    empidWrap.style.display = 'none';
    mobileWrap.style.display = 'block';
  }

  hideError();
}

function checkSlug(val) {
  clearTimeout(slugTimeout);
  const hint = document.getElementById('slug-hint');
  if (!val) { hint.innerHTML = 'Enter our company code'; hint.className = 'slug-hint'; return; }
  hint.textContent = 'Checking...';
  slugTimeout = setTimeout(async () => {
    try {
      const r = await fetch(`/api/org-info?slug=${encodeURIComponent(val)}`);
      const d = await r.json();
      if (d.ok) hint.innerHTML = `<span class="ok">✓ ${d.name}</span>`;
      else hint.innerHTML = `<span class="err">✗ not find Company </span>`;
    } catch { hint.innerHTML = '<span class="err">Server error</span>'; }
  }, 500);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }

async function confirmResetDirect() {
  const newPass = document.getElementById('reset-password').value.trim();
  if (!newPass || newPass.length < 6) { showError('Password 6+ characters'); return; }

  const btn = document.getElementById('confirm-reset-btn');
  btn.disabled = true;
  hideError();

  try {
    let payload = { role: currentRole, password: newPass };

    if (currentRole === 'employee') {
      const name = document.getElementById('reset-name').value.trim();
      const mobile = document.getElementById('reset-mobile').value.trim();
      const empid = document.getElementById('reset-empid').value.trim();

      if (!name) return showError('Name daalo');
      if (!mobile || mobile.length !== 10 || isNaN(mobile)) return showError('10 digit mobile no');
      if (!empid) return showError('Enter Employee ID ');

      payload.name = name;
      payload.mobile = mobile;
      payload.emp_id = empid;

    } else if (currentRole === 'admin') {
      const name = document.getElementById('reset-name').value.trim();
      const mobile = document.getElementById('reset-mobile').value.trim();
      const org_slug = document.getElementById('org-slug').value.trim();

      if (!org_slug) return showError('Enter Company code ');
      if (!name) return showError('Enter Name ');
      if (!mobile || mobile.length !== 10 || isNaN(mobile)) return showError('10 digit mobile No');

      payload.name = name;
      payload.mobile = mobile;
      payload.org_slug = org_slug;

    } else {
      const name = document.getElementById('reset-name').value.trim();
      const mobile = document.getElementById('reset-mobile').value.trim();

      if (!name) return showError('Name daalo');
      if (!mobile || mobile.length !== 10 || isNaN(mobile)) return showError('10 digit mobile No');

      payload.name = name;
      payload.mobile = mobile;
    }

    const res = await fetch('/api/password-reset/direct', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (data.ok) {
      alert('Password updated! Login.');
      window.location.href = '/';
    } else {
      showError(data.error || 'Reset fail ');
    }
  } catch (e) {
    showError('Server error');
  } finally {
    btn.disabled = false;
  }
}

setRole('admin');
</script>
</body>
</html>
